name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PDF rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-noto-cjk poppler-utils
          find /usr/share/fonts \( -iname '*wqy*' -o -iname '*NotoSansCJK*' \) -print -quit | grep .

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/dev.txt -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run module CLI smoke test
        run: |
          python -m apps.cli.main run-mvp \
            --log data/sample_logs/example_flight.csv \
            --asset data/sample_assets/uav_001.json \
            --out /tmp/drone_ops_reports

      - name: Verify module CLI outputs
        run: |
          test -f /tmp/drone_ops_reports/flight_summary.json
          test -f /tmp/drone_ops_reports/anomalies.json
          test -f /tmp/drone_ops_reports/diagnosis.json
          test -f /tmp/drone_ops_reports/maintenance_recommendations.json
          test -f /tmp/drone_ops_reports/ops_report.md
          test -d /tmp/drone_ops_reports/audit
          test "$(find /tmp/drone_ops_reports/audit -name '*.json' | wc -l)" -ge 1

      - name: Run PDF export smoke tests
        run: |
          python -m apps.cli.main export-pdf \
            --markdown /tmp/drone_ops_reports/ops_report.md \
            --out /tmp/drone_ops_reports/ops_report.pdf

          test -s /tmp/drone_ops_reports/ops_report.pdf
          head -c 4 /tmp/drone_ops_reports/ops_report.pdf | grep "%PDF"
          pdftoppm -png -f 1 -singlefile \
            /tmp/drone_ops_reports/ops_report.pdf \
            /tmp/drone_ops_reports/ops_report_page1 \
            2> /tmp/drone_ops_reports/ops_report_pdftoppm.stderr
          test -s /tmp/drone_ops_reports/ops_report_page1.png
          ! grep -E "Missing language pack|Unknown font tag" /tmp/drone_ops_reports/ops_report_pdftoppm.stderr

          python -m apps.cli.main generate-report \
            --summary /tmp/drone_ops_reports/flight_summary.json \
            --anomalies /tmp/drone_ops_reports/anomalies.json \
            --diagnosis /tmp/drone_ops_reports/diagnosis.json \
            --maintenance /tmp/drone_ops_reports/maintenance_recommendations.json \
            --out /tmp/drone_ops_reports/ops_report_regenerated.md \
            --pdf /tmp/drone_ops_reports/ops_report_regenerated.pdf

          test -s /tmp/drone_ops_reports/ops_report_regenerated.pdf
          head -c 4 /tmp/drone_ops_reports/ops_report_regenerated.pdf | grep "%PDF"
          pdftoppm -png -f 1 -singlefile \
            /tmp/drone_ops_reports/ops_report_regenerated.pdf \
            /tmp/drone_ops_reports/ops_report_regenerated_page1 \
            2> /tmp/drone_ops_reports/ops_report_regenerated_pdftoppm.stderr
          test -s /tmp/drone_ops_reports/ops_report_regenerated_page1.png
          ! grep -E "Missing language pack|Unknown font tag" /tmp/drone_ops_reports/ops_report_regenerated_pdftoppm.stderr

      - name: Run entry point CLI smoke test
        run: |
          drone-ops run-mvp \
            --log data/sample_logs/example_flight.csv \
            --asset data/sample_assets/uav_001.json \
            --out /tmp/drone_ops_reports_entrypoint

      - name: Run preflight check smoke test
        run: |
          python -m apps.cli.main preflight-check \
            --asset data/sample_assets/uav_001.json \
            --battery data/sample_assets/battery_001.json \
            --mission data/sample_missions/example_mission.json \
            --observations data/sample_missions/preflight_observations_ok.json \
            --rules data/sample_rules/preflight_rules.yaml \
            --out /tmp/drone_ops_preflight

      - name: Verify preflight check outputs
        run: |
          test -f /tmp/drone_ops_preflight/preflight_check_result.json
          test -d /tmp/drone_ops_preflight/audit
          test "$(find /tmp/drone_ops_preflight/audit -name '*.json' | wc -l)" -ge 1

      - name: Run monitoring replay smoke test
        run: |
          python -m apps.cli.main monitor-replay \
            --telemetry data/sample_logs/example_telemetry.csv \
            --asset data/sample_assets/uav_001.json \
            --rules data/sample_rules/monitoring_rules.yaml \
            --out /tmp/drone_ops_monitoring

      - name: Verify monitoring replay outputs
        run: |
          test -f /tmp/drone_ops_monitoring/monitoring_summary.json
          test -f /tmp/drone_ops_monitoring/monitoring_events.json
          test -d /tmp/drone_ops_monitoring/audit
          test "$(find /tmp/drone_ops_monitoring/audit -name '*.json' | wc -l)" -ge 1

